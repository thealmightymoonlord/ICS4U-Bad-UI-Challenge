<!DOCTYPE html>
<html lang="en" class="disable-tab">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Bad UI Verification Code</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <h1 class="comic-sans">Verification Code</h1>
        
        <div class="verification-container">
            <form id="verification-form">
                <input class="comic-sans" type="text" id="username" placeholder="Name" required>
                <input class="comic-sans" type="email" id="email" placeholder="Email" required>
                <button class="comic-sans" type="submit">Send Code</button>
            </form>
        </div>
        
        <div id="drag-section" style="display:none;">
            <p class="comic-sans">Drag the correct code (in order):</p>

            <div class="box-tray" id="box-tray">
                <div class="box" id="box-0"></div>
                <div class="box" id="box-1"></div>
                <div class="box" id="box-2"></div>
                <div class="box" id="box-3"></div>
                <div class="box" id="box-4"></div>
                <div class="box" id="box-5"></div>
            </div>

            <div class="numbers">
                <span data-num="0">0</span>
                <span data-num="1">1</span>
                <span data-num="2">2</span>
                <span data-num="3">3</span>
                <span data-num="4">4</span>
                <span data-num="5">5</span>
                <span data-num="6">6</span>
                <span data-num="7">7</span>
                <span data-num="8">8</span>
                <span data-num="9">9</span>
            </div>

            <button class="comic-sans" id="verify-btn">Verify Code</button>
        </div> <div id="ad-container"></div>

        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
        <script src="script.js"></script>

    </body>
</html>
